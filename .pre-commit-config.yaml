# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.3.0
    hooks:
      - id: trailing-whitespace
        exclude: ^(assets/|_scripts/|_plugins/|_sass/font-awesome/|lighthouse_results/|\.gitattributes|\.gitignore|.*\.min\..*|.*\.map$)
      - id: end-of-file-fixer
        exclude: ^(assets/|_scripts/|_plugins/|_sass/font-awesome/|lighthouse_results/|\.gitattributes|\.gitignore|.*\.min\..*|.*\.map$)
      - id: check-yaml
      - id: check-added-large-files
  - repo: local
    hooks:
      - id: prettier
        name: prettier
        entry: npx --no-install prettier --write
        language: system
        files: \.(md|markdown|ya?ml|json|js|ts|scss|css|liquid|html)$
        exclude: ^(package-lock\.json|\.venv/)
